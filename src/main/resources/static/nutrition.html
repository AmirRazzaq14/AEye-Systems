<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">

    <script>
        (function () {
            try {
                const saved = localStorage.getItem("wizcoach-theme");
                if (saved) {
                    document.documentElement.setAttribute("data-theme", saved);
                }
            } catch (e) {}
        })();
    </script>
    <link rel="stylesheet" href="css/theme.css">
    <script src="js/theme.js" defer></script>
    <title>WizCoach – Nutrition</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-auth-compat.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --purple: #7c5cfc;
            --blue: #3b82f6;
            --text: #1a1a2e;
            --muted: #6b7280;
            --border: #e5e7eb;
            --danger: #ef4444;
            --success: #10b981;
            --warning: #f59e0b;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #e8ecf5 0%, #f0eeff 50%, #e8f0ff 100%);
            min-height: 100vh;
            color: var(--text);
        }
        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            height: 60px;
            background: white;
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 8px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
        .nav-logo-icon {
            width: 36px; height: 36px;
            background: linear-gradient(135deg, var(--purple), #a78bfa);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .nav-logo-icon svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2.5; }
        .nav-logo-name { font-size: 1.1rem; font-weight: 700; color: var(--text); }
        .nav-links { display: flex; align-items: center; gap: 0.25rem; }
        .nav-link {
            display: flex; align-items: center; gap: 0.4rem;
            padding: 0.45rem 1rem; border-radius: 8px;
            font-size: 0.88rem; font-weight: 500; color: var(--muted);
            text-decoration: none; transition: all 0.15s;
        }
        .nav-link:hover { color: var(--text); background: #f3f4f6; }
        .nav-link.active { background: var(--blue); color: white; font-weight: 600; }
        .nav-link svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; }
        .page {
            max-width: 1100px; margin: 2rem auto; padding: 0 2rem;
            display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem;
            animation: fadeUp 0.5s ease both; align-items: start;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .card {
            background: white; border-radius: 20px; padding: 1.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
        }
        .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 1.25rem; }
        .upload-zone {
            border: 2px dashed #c7d2fe; border-radius: 14px; background: #f8f9ff;
            padding: 3rem 2rem; display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 0.75rem;
            cursor: pointer; transition: all 0.2s; text-align: center;
            position: relative; min-height: 320px;
        }
        .upload-zone:hover { border-color: var(--blue); background: #eff6ff; transform: scale(1.01); }
        .upload-zone.drag-over { border-color: var(--blue); background: #dbeafe; transform: scale(1.02); }
        .upload-zone.processing { pointer-events: none; opacity: 0.7; }
        .upload-icon-wrap {
            width: 56px; height: 56px; background: #dbeafe;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
        }
        .upload-icon-wrap svg { width: 26px; height: 26px; stroke: var(--blue); fill: none; stroke-width: 1.8; }
        .upload-zone h4 { font-size: 1rem; font-weight: 700; color: var(--text); }
        .upload-zone p { font-size: 0.82rem; color: var(--muted); }
        .preview-img-container { display: none; width: 100%; max-height: 260px; text-align: center; }
        .upload-zone.has-image .upload-icon-wrap, .upload-zone.has-image h4, .upload-zone.has-image p { display: none; }
        .upload-zone.has-image .preview-img-container { display: block; }
        .preview-img-container img { width: 100%; max-height: 200px; object-fit: contain; border-radius: 12px; }
        .processing-message {
            display: none; flex-direction: column; align-items: center; justify-content: center;
            gap: 1rem; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(248, 249, 255, 0.95); border-radius: 14px; z-index: 10;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #e5e7eb;
            border-top: 4px solid var(--blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .btn-primary {
            background: linear-gradient(135deg, var(--blue), #60a5fa); color: white;
            padding: 0.65rem 1.5rem; border: none; border-radius: 10px;
            font-family: inherit; font-size: 0.88rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            box-shadow: 0 3px 10px rgba(59,130,246,0.35);
        }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 5px 14px rgba(59,130,246,0.45); }
        .btn-secondary {
            padding: 0.55rem 1.25rem; border: 1.5px solid var(--border); border-radius: 10px;
            background: white; font-family: inherit; font-size: 0.85rem; font-weight: 600;
            color: var(--muted); cursor: pointer; transition: all 0.15s;
        }
        .btn-secondary:hover { border-color: var(--danger); color: var(--danger); background: #fee2e2; }
        .btn-icon {
            background: var(--blue); color: white; border: none; border-radius: 50%;
            width: 36px; height: 36px; font-size: 1.5rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; display: inline-flex;
            align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: #2563eb; transform: scale(1.05); }
        .nutrition-row { display: flex; flex-direction: column; gap: 1rem; }
        .nutrition-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; }
        .nutrition-meta span:first-child { font-size: 0.85rem; color: var(--muted); }
        .nutrition-meta span:last-child { font-size: 0.85rem; font-weight: 600; color: var(--text); }
        .track { height: 6px; background: #e5e7eb; border-radius: 99px; overflow: hidden; }
        .track-fill {
            height: 100%; border-radius: 99px;
            background: linear-gradient(90deg, var(--blue), #60a5fa);
            width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .food-log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .food-log-empty { text-align: center; color: var(--muted); font-size: 0.85rem; font-style: italic; padding: 1.5rem 0; }
        .food-log-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 0; border-bottom: 1px solid var(--border); transition: background 0.2s;
        }
        .food-log-item:hover { background: #f9fafb; padding-left: 0.5rem; padding-right: 0.5rem; margin: 0 -0.5rem; border-radius: 8px; }
        .food-log-item:last-child { border-bottom: none; }
        .food-log-content { flex: 1; }
        .food-log-name { font-weight: 600; color: var(--text); display: block; margin-bottom: 0.25rem; }
        .food-log-details { font-size: 0.75rem; color: var(--muted); display: flex; gap: 0.75rem; flex-wrap: wrap; }
        .food-log-delete {
            background: none; border: none; font-size: 1.2rem; color: #9ca3af;
            cursor: pointer; transition: all 0.2s; width: 28px; height: 28px;
            border-radius: 6px; display: inline-flex; align-items: center; justify-content: center;
        }
        .food-log-delete:hover { color: var(--danger); background: #fee2e2; transform: scale(1.1); }
        .manual-entry {
            display: flex; flex-direction: column; gap: 0.75rem;
            background: #f9fafb; padding: 1rem; border-radius: 12px; margin-bottom: 1rem;
        }
        .manual-entry input {
            padding: 0.75rem 1rem; border: 1.5px solid var(--border); border-radius: 12px;
            font-size: 0.88rem; font-family: 'DM Sans', sans-serif; color: var(--text);
            background: #ffffff; outline: none; transition: all 0.2s;
        }
        .manual-entry input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .journal-input {
            width: 100%; padding: 0.75rem; border: 1.5px solid var(--border);
            border-radius: 12px; font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem; line-height: 1.5; resize: vertical; transition: all 0.2s;
        }
        .journal-input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .journal-footer { display: flex; justify-content: flex-end; align-items: center; margin-top: 0.5rem; }
        .journal-status { font-size: 0.7rem; color: var(--muted); }
        .sidebar { display: flex; flex-direction: column; gap: 1.25rem; }
        .hidden { display: none; }
        .text-danger { color: var(--danger); }
        @media (max-width: 720px) {
            .page { grid-template-columns: 1fr; }
            nav { padding: 0 1rem; }
            .nav-logo-name { display: none; }
        }
    </style>
</head>

<div class="page">
    <div class="card">
        <h3>Food Detection</h3>
        <div class="upload-zone" id="uploadZone">
            <div class="upload-icon-wrap">
                <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </div>
            <h4>Upload Food Image</h4>
            <p>Take a photo or upload an image of your meal</p>
            <div class="preview-img-container">
                <img id="previewImg" src="" alt="Food preview">
            </div>
            <div class="processing-message" id="processingMessage">
                <div class="spinner"></div>
                <span>Analyzing your meal...</span>
            </div>
            <button class="btn-primary" id="uploadButton">Upload Image</button>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>

    <div class="sidebar">
        <div class="card">
            <h3>Today's Nutrition</h3>
            <div class="nutrition-row" id="nutritionStats">
            </div>
        </div>

        <div class="card">
            <div class="food-log-header">
                <h3>📔 Daily Journal</h3>
                <span style="font-size: 0.75rem; color: var(--muted);" id="journalDate"></span>
            </div>
            <label for="journalInput"></label><textarea id="journalInput" class="journal-input" rows="3" placeholder="How was your day? Write your thoughts here..."></textarea>
            <div class="journal-footer">
                <span id="journalStatus" class="journal-status"></span>
            </div>
        </div>

        <div class="card">
            <div class="food-log-header">
                <h3>Food Log</h3>
                <button class="btn-icon" id="addFoodBtn">+</button>
<!--                <button class="btn-icon" id="deleteTodayBtn" title="Delete today's data">×</button>-->
            </div>
            <div id="manualEntryForm" class="manual-entry hidden">
                <label for="foodName"></label><input type="text" id="foodName" placeholder="Food name">
                <label for="foodCals"></label><input type="number" id="foodCals" placeholder="Calories (kcal)" min="0">
                <label for="foodProtein"></label><input type="number" id="foodProtein" placeholder="Protein (g)" min="0">
                <label for="foodCarb"></label><input type="number" id="foodCarb" placeholder="Carbs (g)" min="0">
                <label for="foodFat"></label><input type="number" id="foodFat" placeholder="Fat (g)" min="0">
                <button class="btn-primary" id="saveManualBtn">Add to Log</button>
            </div>
            <div id="foodLog">
                <p class="food-log-empty">Loading...</p>
            </div>
        </div>
    </div>
</div>

<script>

    const API = {
        async fetch(path, options = {}) {
            const user = firebase.auth().currentUser;
            if (!user) throw new Error('Not logged in');
            const token = await user.getIdToken();

            const res = await fetch(`/api/nutrition-logs${path}`, {
                ...options,
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    ...options.headers
                }
            });

            if (!res.ok) throw new Error(`API Error: ${res.status}`);
            return res.json();
        },

        getToday(){
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        },

        getTodayLog() { return this.fetch(`/${API.getToday()}`, { method: 'GET' }); },
        addMeal(meal) { return this.fetch(`/meals/${API.getToday()}`, { method: 'POST', body: JSON.stringify(meal) }); },
        deleteMeal(mealId) { return this.fetch(`/meals/${API.getToday()}/${mealId}`, { method: 'DELETE' }); },
        saveNotes(notes) { return this.fetch(`/notes/${API.getToday()}`, { method: 'POST', body: JSON.stringify({ notes }) }); },

        deleteTodayLog() { return this.fetch(`/${API.getToday()}`, { method: 'DELETE' }); },

        async analyzeImage(file) {
            const formData = new FormData();
            formData.append('image', file);
            const user = firebase.auth().currentUser;
            const token = await user.getIdToken();

            const res = await fetch('/api/nutrition-logs/analyze-image', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (!res.ok) throw new Error('Analysis failed');
            return res.json(); // Returns to the Meal object
        }
    };

    const UI = {
        data: null,

        init() {
            this.bindEvents();
            this.load();
        },

        async load() {
            console.log('[LOAD] Fetching today\'s nutrition data');

            try {

                console.log('[LOAD] Requesting data for date:', API.getToday());
                this.data = await API.getTodayLog();
                this.data.meals = this.data.meals || [];
                console.log('[LOAD] Data fetched successfully:', this.data);
                this.render();
            } catch (err) {
                console.error('[LOAD] Failed to fetch data:', err);
                alert('Failed to load data: ' + err.message);
            }
        },

        render() {
            console.log('[RENDER] Rendering UI with nutrition data');
            const { totalNutrition, targetNutrition, meals, notes } = this.data;

            // Render nutrition progress
            console.log('[RENDER] Rendering total nutrition:', totalNutrition);
            console.log('[RENDER] Rendering target nutrition:', targetNutrition);

            // Render nutrition progress
            const statsHtml = ['cals', 'protein', 'carb', 'fat'].map(key => {
                const current = parseFloat(totalNutrition?.[key] || 0);
                const target = parseFloat(targetNutrition?.[key] || 1);
                const percent = Math.min(100, (current / target) * 100);
                const over = current > target;
                // Set the color according to the percentage
                const ratio = Math.min(1, current / target);
                let r = Math.floor(255 * ratio);
                let g = Math.floor(255 * (1 - ratio));
                const color = `rgb(${r}, ${g}, 0)`;
                return `                <div>
                    <div class="nutrition-meta">
                        <span>${key.charAt(0).toUpperCase() + key.slice(1)}</span>
                        <span class="${over ? 'text-danger' : ''}">${Math.round(current)} / ${Math.round(target)} ${key === 'cals' ? 'kcal' : 'g'}</span>
                    </div>
                    <div class="track">
                        <div class="track-fill" style="width: ${percent}%; background: ${color};"></div>
                    </div>
                </div>
            `;
            }).join('');
            document.getElementById('nutritionStats').innerHTML = statsHtml;

            // Render food logs
            const logContainer = document.getElementById('foodLog');
            if (!meals || meals.length === 0) {
                console.log('[RENDER] No meals found');
                logContainer.innerHTML = '<p class="food-log-empty">No meals logged yet</p>';
                return;
            }

            console.log('[RENDER] Rendering meals list, count:', meals.length);
            console.log('[RENDER] Meals data:', meals);
            logContainer.innerHTML = meals.map(m => {
                console.log('[RENDER] Rendering meal item:', m);
                return `            <div class="food-log-item" data-id="${m.mealId}">
                        <div class="food-log-content">
                            <span class="food-log-name">${this.escape(m.name)}</span>
                            <div class="food-log-details">
                                <span>🔥 ${m.cals} kcal</span>
                                <span>💪 ${m.protein}g</span>
                                <span>🍞 ${m.carb}g</span>
                                <span>🥑 ${m.fat}g</span>
                            </div>
                        </div>
                        <button class="food-log-delete" onclick="UI.deleteMeal('${m.mealId}')">×</button>
                    </div>
                `;
            }).join('');


            // Render the diary
            const journalInput = document.getElementById('journalInput');
            if (journalInput.value !== (notes || '')) {
                journalInput.value = notes || '';
            }
            document.getElementById('journalDate').textContent = API.getToday();
        },

        bindEvents() {
            // Upload an image
            const uploadZone = document.getElementById('uploadZone');
            const fileInput = document.getElementById('fileInput');

            uploadZone.addEventListener('click', (e) => {
                if (e.target.id !== 'uploadButton') fileInput.click();
            });
            document.getElementById('uploadButton').addEventListener('click', (e) => {
                e.stopPropagation();
                fileInput.click();
            });

            fileInput.addEventListener('change', (e) => this.handleImage(e.target.files[0]));

            uploadZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadZone.classList.add('drag-over');
            });
            uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
            uploadZone.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadZone.classList.remove('drag-over');
                const file = e.dataTransfer.files[0];
                if (file?.type.startsWith('image/')) this.handleImage(file);
            });

            // Add manually
            const addBtn = document.getElementById('addFoodBtn');
            const manualForm = document.getElementById('manualEntryForm');
            addBtn.addEventListener('click', () => {
                manualForm.classList.toggle('hidden');
                addBtn.textContent = manualForm.classList.contains('hidden') ? '+' : '−';
            });

            document.getElementById('saveManualBtn').addEventListener('click', () => this.addManual());

            // The diary is automatically saved
            let timeout;
            const journalInput = document.getElementById('journalInput');
            const status = document.getElementById('journalStatus');

            journalInput.addEventListener('input', () => {
                console.log('[JOURNAL] Journal content changed');
                status.textContent = 'Unsaved...';
                status.style.color = 'var(--warning)';
                clearTimeout(timeout);
                timeout = setTimeout(() => this.saveJournal(), 1500);
            });

<!--            //  Delete today log-->
<!--            document.getElementById('deleteTodayBtn').addEventListener('click', () => {-->
<!--                if (confirm('Delete all today\'s nutrition data?')) {-->
<!--                    this.deleteTodayLog();-->
<!--                }   -->
<!--            });-->
        },

        async handleImage(file) {
            console.log('[IMAGE] User selected image:', file.name);
            if (!file) return;
            if (!['image/jpeg', 'image/png', 'image/webp'].includes(file.type)) {
                console.warn('[IMAGE] Unsupported image type:', file.type);
                alert('Please upload a valid image (JPEG, PNG, WebP)');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                console.warn('[IMAGE] Image size exceeds limit:', file.size / 1024 / 1024, 'MB');
                alert('Image size should be less than 5MB');
                return;
            }

            // PREVIEW
            const reader = new FileReader();
            reader.onload = (e) => {
                console.log('[IMAGE] Preview loaded');
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('uploadZone').classList.add('has-image');
            };
            reader.readAsDataURL(file);

            // analysis
            document.getElementById('uploadZone').classList.add('processing');
            try {
                const result = await API.analyzeImage(file);
                console.log('[IMAGE] Image analysis completed');

               const meal = {
                    mealId: result.mealId || result.id || 'meals_' + Date.getTime(),
                    name: result.name || 'Analyzed Food',
                    cals: String(result.cals || result.calories || '0'),
                    protein: String(result.protein || '0'),
                    carb: String(result.carb || result.carbs || '0'),
                    fat: String(result.fat || '0')
                };

                await API.addMeal(meal);

                await this.load(); // Reload today's data
            } catch (err) {
                console.error('[IMAGE] Image analysis failed:', err);
                alert('Analysis failed: ' + err.message);
            } finally {
                document.getElementById('uploadZone').classList.remove('processing');
            }
        },

        async addManual() {
            console.log('[MANUAL] User clicked add meal button');
            const meal = {
                mealId: 'meals_' + new Date().getTime(),
                name: document.getElementById('foodName').value.trim() || 'Manual Entry',
                cals: document.getElementById('foodCals').value || '0',
                protein: document.getElementById('foodProtein').value || '0',
                carb: document.getElementById('foodCarb').value || '0',
                fat: document.getElementById('foodFat').value || '0'
            };
            console.log('[MANUAL] Submitting meal data:', meal);

            try {
                await API.addMeal(meal);
                console.log('[MANUAL] Meal added successfully');
                await this.load();
                // Clear the form
                ['foodName', 'foodCals', 'foodProtein', 'foodCarb', 'foodFat'].forEach(id => {
                    document.getElementById(id).value = '';
                });
                document.getElementById('manualEntryForm').classList.add('hidden');
                document.getElementById('addFoodBtn').textContent = '+';
            } catch (err) {
                console.error('[MANUAL] Failed to add meal:', err);
                alert('Failed to add: ' + err.message);
            }
        },

        async deleteMeal(mealId) {
            console.log('[DELETE] User clicked delete meal, ID:', mealId);
            if (!confirm('Delete this meal?')) return;
            try {
                await API.deleteMeal(mealId);
                console.log('[DELETE] Meal deleted successfully');
                await this.load();
            } catch (err) {
                console.error('[DELETE] Failed to delete meal:', err);
                alert('Failed to delete: ' + err.message);
                await this.load();
            }
        },

        async saveJournal() {
            const notes = document.getElementById('journalInput').value;
            const status = document.getElementById('journalStatus');
            console.log('[JOURNAL] Saving journal content:', notes);

            try {
                await API.saveNotes(notes);
                status.textContent = 'Saved!';
                status.style.color = 'var(--success)';
                setTimeout(() => status.textContent = '', 2000);
            } catch (err) {
                console.error('[JOURNAL] Failed to save:', err);
                status.textContent = 'Save failed';
                status.style.color = 'var(--danger)';
            }
        },

        async deleteTodayLog() {
            console.log('[DELETE] User clicked delete today\'s data button');
            try {
                await API.deleteTodayLog();
                console.log('[DELETE] Today\'s data deleted successfully');
                await this.load();
                alert('Today\'s nutrition data has been deleted');
            } catch (err) {
                console.error('[DELETE] Failed to delete today\'s data:', err);
                alert('Failed to delete today\'s data: ' + err.message);
            }
        },

        escape(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    };

    // Initialize Firebase and launch it
    async function init() {
        console.log('[INIT] DOMContentLoaded event triggered, initializing Firebase');
        try {
            const res = await fetch('/api/config');
            console.log('[INIT] API config fetched:', res);
            const config = await res.json();
            firebase.initializeApp(config);

            firebase.auth().onAuthStateChanged(user => {
                console.log('[AUTH] Auth state changed:', user ? 'User signed in' : 'No user');
                if (!user) {
                    window.location.href = 'login.html';
                    return;
                }
                UI.init();
            });
        } catch (err) {
            console.error('[INIT] Initialization failed:', err.message);
            alert('Initialization failed: ' + err.message);
        }
    }

    document.addEventListener('DOMContentLoaded', init);
</script>

<button onclick="toggleTheme()"
        class="theme-btn"
        title="Toggle Dark Mode">🌓</button>

</body>
</html>
